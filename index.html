<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Graph</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <!-- Your D3 JS content will append the SVG here -->
        <div id="graph-container">
        </div>
        
        <!-- Checkbox for enabling time slider -->
        <div>
            <input type="checkbox" id="use_legs_volatility_checkbox"> Volatility per leg
        </div>
        
        <!-- Placeholder for sliders and checkboxes -->
        <div id="controls-container">
            <div id="ivCheckboxContainer"></div>
            <div id="sliders_container"></div>
            <div id="timeSliderContainer"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="functions.js" type="module"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
