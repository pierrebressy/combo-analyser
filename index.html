<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combo Analyzer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="functions.js" type="module"></script>
  <script src="configuration.js" type="module"></script>
  <script src="async.js" type="module"></script>
  <script src="script.js" type="module"></script>
</head>

<body>
  <div class="control-container" id="control-container">
    <p id="control-container-dimensions">Dimensions: </p>
    <div class="status-container" id="status-container">
      <div id="local-status-container"></div>
      <div id="underlying-status-container"></div>
      <div id="change-status-container"></div>
      <div id="auto-save-checkbox-container"></div>
    </div>
    <div class="context-container" id="context-container">
      <div id="title_container"></div>
      <div id="combo_container"></div>
      <div id="displayModeCheckboxContainer"></div>
      <div id="ivCheckboxContainer"></div>
      <div id="timeSliderContainer"></div>
      <div id="sliders_container"></div>
    </div>
    <br>
    <div class="combo-templates-container" id="combo-tpl-container">
      <div id="combo_tpl_container"></div><br>
      <div id="underlying_list_container"></div><br>
      <label for="comboName">Name of the combo:</label>
      <textarea id="comboName" rows="1" placeholder="Combo name"></textarea>
      <br>
      <button id="button_view_combo">View combo</button>
      <button id="button_create_combo">Create combo</button>
    </div>
    <br>
    <div class="knob-container" id="knob-container"></div>

  </div>
  <div class="graph-container" id="graph-container">
  </div>
</body>

</html>
